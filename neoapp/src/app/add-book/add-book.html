<p>add-book works!</p>
<h2 [hidden]="isEditing">Add a New Book</h2>
<h2 [hidden]="!isEditing">Edit Book</h2>
<form (ngSubmit)="addBookToList()">
  <label for="id">ID:</label>
  <input type="number" id="id" [(ngModel)]="id" name="id" required [readonly]="isEditing">
  <br>
  <label for="title">Title:</label>
  <input type="text" id="title" [(ngModel)]="title" name="title" required>
  <br>
  <label for="author">Author:</label>
  <input type="text" id="author" [(ngModel)]="author" name="author" required>
  <br>
  <button type="submit" [hidden]="isEditing">Add Book</button>
  <div [hidden]="!isEditing">
    <button type="button" (click)="updateBook()">Update</button>
    <button type="button" (click)="cancelEdit()">Cancel</button>
  </div>
</form>
