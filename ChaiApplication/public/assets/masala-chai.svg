  <path d="M 200 100 Q 195 75 200 50" stroke="#E8D4C0" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 230 100 Q 235 80 230 60" stroke="#E8D4C0" stroke-width="3" fill="none" opacity="0.7"/>
  
  <!-- Text -->
