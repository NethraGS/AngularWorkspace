<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C07043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5A3C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad2)"/>
  
  <!-- Cup -->
  <circle cx="200" cy="150" r="60" fill="#F5DEB3" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Chai inside -->
  <circle cx="200" cy="150" r="55" fill="#CD853F"/>
  
  <!-- Ginger pieces -->
  <rect x="180" y="130" width="8" height="15" fill="#FFD700" transform="rotate(30 184 137)"/>
  <rect x="210" y="140" width="8" height="15" fill="#FFD700" transform="rotate(-20 214 147)"/>
  
  <!-- Steam -->
  <path d="M 170 100 Q 165 80 170 60" stroke="#FFF8DC" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 200 100 Q 195 75 200 50" stroke="#FFF8DC" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 230 100 Q 235 80 230 60" stroke="#FFF8DC" stroke-width="3" fill="none" opacity="0.7"/>
  
  <!-- Text -->
  <text x="200" y="240" font-size="28" font-weight="bold" text-anchor="middle" fill="white">
    Ginger Chai
  </text>
  <text x="200" y="270" font-size="14" text-anchor="middle" fill="#FFE4B5">
    Warm and Soothing Spice
  </text>
</svg>