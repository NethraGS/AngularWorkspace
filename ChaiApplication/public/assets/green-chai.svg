<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B876C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#556B57;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad3)"/>
  
  <!-- Cup -->
  <circle cx="200" cy="150" r="60" fill="#D4EDD4" stroke="#3D5A3D" stroke-width="2"/>
  
  <!-- Chai inside -->
  <circle cx="200" cy="150" r="55" fill="#7DB87D"/>
  
  <!-- Tea leaves -->
  <ellipse cx="185" cy="150" rx="8" ry="12" fill="#5A8C5A" transform="rotate(-20 185 150)"/>
  <ellipse cx="215" cy="145" rx="8" ry="12" fill="#5A8C5A" transform="rotate(25 215 145)"/>
  <ellipse cx="200" cy="165" rx="8" ry="12" fill="#5A8C5A" transform="rotate(0 200 165)"/>
  
  <!-- Steam -->
  <path d="M 170 100 Q 165 80 170 60" stroke="#E8F0E8" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 200 100 Q 195 75 200 50" stroke="#E8F0E8" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 230 100 Q 235 80 230 60" stroke="#E8F0E8" stroke-width="3" fill="none" opacity="0.7"/>
  
  <!-- Text -->
  <text x="200" y="240" font-size="28" font-weight="bold" text-anchor="middle" fill="white">
    Green Chai
  </text>
  <text x="200" y="270" font-size="14" text-anchor="middle" fill="#D4EDD4">
    Healthy Green Tea Blend
  </text>
</svg>