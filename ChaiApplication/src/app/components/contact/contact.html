<div class="contact-container">
  <div class="contact-content">
    <h1>Contact Us</h1>
    <p class="intro-text">Have questions about our chai? We'd love to hear from you!</p>
    
    <div class="contact-info">
      <div class="info-item">
        <h3>📍 Location</h3>
        <p>123 Chai Street<br>Tea Valley, TV 45678<br>India</p>
      </div>
      <div class="info-item">
        <h3>📞 Phone</h3>
        <p>+91 (555) 123-4567<br>Mon-Sat: 9AM-6PM</p>
      </div>
      <div class="info-item">
        <h3>📧 Email</h3>
        <p>hello@chaiShop.com<br>support@chaiShop.com</p>
      </div>
    </div>

    <div class="contact-form">
      <h2>Send us a Message</h2>
      <div class="form-group">
        <label>Name:</label>
        <input 
          type="text" 
          [(ngModel)]="senderName" 
          placeholder="Your name"
        />
      </div>
      <div class="form-group">
        <label>Email:</label>
        <input 
          type="email" 
          [(ngModel)]="senderEmail" 
          placeholder="Your email"
        />
      </div>
      <div class="form-group">
        <label>Phone:</label>
        <input 
          type="tel" 
          [(ngModel)]="senderPhone" 
          placeholder="Your phone (optional)"
        />
      </div>
      <div class="form-group">
        <label>Message:</label>
        <textarea 
          [(ngModel)]="contactMessage" 
          placeholder="Your message"
          rows="5"
        ></textarea>
      </div>
      <button (click)="sendMessage()" class="submit-btn">Send Message</button>
      <div *ngIf="messageSubmitted" class="success-message">✓ Message sent successfully!</div>
    </div>
  </div>
</div>
